name: Rebuild OTA index

on:
  push:
    branches: [main]
    paths:
      - 'ota/*.ota'

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Rebuild ota/index.json
        run: python .github/scripts/build_ota_index.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ota/index.json
          if git diff --cached --quiet; then
            echo "No changes to ota/index.json"
          else
            git commit -m "ota: update index [skip ci]"
            git push
          fi
